# fly.toml app configuration file generated for BundleStack.
# See https://fly.io/docs/reference/configuration/

app = 'bundlestack'
primary_region = 'sjc'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'
  DATABASE_URL = 'file:/data/production.sqlite'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = 'bundlestack_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
