name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy..."
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Deploy hook fired."

      - name: No deploy hook configured
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "Set RENDER_DEPLOY_HOOK_URL in GitHub repo secrets to auto-trigger Render."
          echo "Or use Manual Deploy in the Render dashboard."
