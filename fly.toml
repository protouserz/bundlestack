# fly.toml app configuration file generated for BundleStack.
# Prefer Postgres via DATABASE_URL secret (Neon/Render/Fly Postgres).

app = 'bundlestack'
primary_region = 'sjc'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
