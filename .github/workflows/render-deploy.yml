name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${DEPLOY_HOOK}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set in repo secrets."
            echo "Add your Render deploy hook URL to enable auto-deploy on push."
            echo "Or use Manual Deploy in the Render dashboard."
            exit 0
          fi
          echo "Triggering Render deploy..."
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Deploy hook fired."
