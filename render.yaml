services:
  - type: web
    name: bundlestack
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/production.sqlite
      - key: SCOPES
        value: read_products,write_products,write_discounts,read_discounts
      - key: SUPPORT_EMAIL
        value: protouserz@proton.me
      - key: SHOPIFY_BILLING_TEST
        value: "false"
      - key: SHOPIFY_APP_URL
        value: https://bundlestack-pfee.onrender.com
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
