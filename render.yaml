services:
  - type: web
    name: bundlestack
    runtime: docker
    # Starter keeps the instance warm so app-proxy (storefront) is not cold-started.
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bundlestack-db
          property: connectionString
      - key: SCOPES
        value: read_products,write_discounts,read_discounts
      - key: SUPPORT_EMAIL
        value: protouserz@proton.me
      - key: SHOPIFY_BILLING_TEST
        value: "false"
      - key: SHOPIFY_APP_URL
        value: https://bundlestack-pfee.onrender.com
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false

databases:
  - name: bundlestack-db
    plan: basic-256mb
    postgresMajorVersion: "16"
